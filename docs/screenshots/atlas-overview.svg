<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Philo Atlas English interface preview</title>
  <desc id="desc">A light world map with philosopher markers, timeline, nearby search and a profile panel.</desc>
  <rect width="1600" height="900" fill="#dfe7e8"/>
  <path d="M0 250C180 140 330 190 470 260s230 50 370-45 250-85 390 10 220 100 370 10v665H0Z" fill="#cbd5d7" opacity=".85"/>
  <path d="M0 450c170-100 310-80 430 30s240 120 390 15 250-145 390-40 260 90 390 0v445H0Z" fill="#d3ddde"/>
  <g fill="#f6f3e9" stroke="#c3cecf" stroke-width="4" opacity=".95">
    <path d="M90 180 250 90l170 60 30 140-150 80-160-80Z"/><path d="M520 180 680 110l140 100-35 155-150 30-100-90Z"/><path d="M850 180 1050 120l180 100-20 205-180 55-155-115Z"/><path d="M1150 470 1400 360l150 100-110 170-190 20Z"/>
  </g>
  <g font-family="Arial, sans-serif"><rect x="35" y="35" width="360" height="105" rx="22" fill="#26342d"/><circle cx="82" cy="88" r="23" fill="none" stroke="#c99b34" stroke-width="2"/><text x="75" y="98" fill="#d4a63b" font-size="28">Φ</text><text x="120" y="82" fill="#fffdf5" font-size="29" font-weight="700">Philo Atlas</text><text x="120" y="111" fill="#bdc4bb" font-size="13" letter-spacing="3">IDEAS, PEOPLE AND COORDINATES</text>
  <rect x="35" y="170" width="170" height="48" rx="24" fill="#f8f1df"/><text x="67" y="201" fill="#356a52" font-size="17" font-weight="700">Explore nearby</text>
  <rect x="1180" y="42" width="370" height="780" rx="28" fill="#f8f1df"/><rect x="1180" y="42" width="370" height="180" rx="28" fill="#314239"/><text x="1215" y="202" fill="#d7ad43" font-size="14" font-weight="700">PHILOSOPHER</text><text x="1215" y="275" fill="#202c27" font-size="33" font-family="Georgia,serif" font-weight="700">Friedrich Nietzsche</text><text x="1215" y="307" fill="#356a52" font-size="17" font-weight="700">1844 CE — 1900 CE</text><text x="1215" y="362" fill="#6f766d" font-size="12" font-weight="700" letter-spacing="2">SUMMARY</text><text x="1215" y="395" fill="#36403a" font-size="16">A source-backed paragraph appears</text><text x="1215" y="420" fill="#36403a" font-size="16">here, localized to the selected language.</text><line x1="1215" y1="460" x2="1515" y2="460" stroke="#d8d1c0"/><text x="1215" y="495" fill="#6f766d" font-size="12" font-weight="700">BORN IN</text><text x="1215" y="522" fill="#202c27" font-size="16" font-weight="700">Röcken</text><text x="1365" y="495" fill="#6f766d" font-size="12" font-weight="700">LIVED</text><text x="1365" y="522" fill="#202c27" font-size="16" font-weight="700">56 years</text><rect x="1215" y="570" width="210" height="42" rx="21" fill="#356a52"/><text x="1242" y="597" fill="white" font-size="15" font-weight="700">Show journey on map</text><text x="1215" y="664" fill="#6f766d" font-size="12" font-weight="700">INFLUENCED BY</text><rect x="1215" y="682" width="120" height="32" rx="16" fill="#ead9a8"/><text x="1230" y="703" fill="#26342d" font-size="13" font-weight="700">Schopenhauer</text>
  <rect x="430" y="735" width="690" height="120" rx="24" fill="#f8f1df"/><text x="462" y="775" fill="#356a52" font-size="15" font-weight="700" letter-spacing="2">TRAVEL THROUGH TIME</text><text x="462" y="800" fill="#687168" font-size="14">39 philosophers alive in 1888 CE</text><text x="995" y="790" fill="#202c27" font-size="28" font-family="Georgia,serif" font-weight="700">1888 CE</text><line x1="465" y1="830" x2="1080" y2="830" stroke="#356a52" stroke-width="8" stroke-linecap="round"/><circle cx="920" cy="830" r="12" fill="#356a52"/></g>
  <g fill="#356a52" stroke="#f8f1df" stroke-width="7"><circle cx="700" cy="325" r="23"/><circle cx="820" cy="390" r="23"/><circle cx="945" cy="300" r="23"/><circle cx="1020" cy="450" r="23"/></g>
